version: "3.8"

networks:
  thvote-test:
    name: thvote-net
    external: true

volumes:
  postgres-test-data:
  redis-test-data:

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: thvote-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: thvote_test
      POSTGRES_USER: thvote_test
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-thvote_test_pass}
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    networks:
      - thvote-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thvote_test -d thvote_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: thvote-redis-test
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-test-data:/data
    networks:
      - thvote-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend-test:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    image: thvote-backend:test
    container_name: thvote-backend-test
    restart: unless-stopped
    env_file:
      - ../.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://thvote_test:${TEST_DB_PASSWORD:-thvote_test_pass}@postgres-test:5432/thvote_test
      REDIS_URL: redis://redis-test:6379/0
      APOLLO_ENABLED: ${APOLLO_ENABLED:-yes}
      APOLLO_META: ${APOLLO_META:-http://apollo-configservice:8080}
      APOLLO_ENV: ${APOLLO_ENV:-fat}
      APOLLO_CLUSTER: ${APOLLO_CLUSTER:-default}
      APOLLO_APP_ID: ${APOLLO_APP_ID:-thvote-backend}
      APOLLO_NAMESPACES: ${APOLLO_NAMESPACES:-application}
    volumes:
      - ../logs:/app/logs
    networks:
      - thvote-test
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend-test:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.test
    image: thvote-frontend:test
    container_name: thvote-frontend-test
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ../frontend/nginx/test.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - thvote-test
    depends_on:
      - backend-test
