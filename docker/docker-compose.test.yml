version: "3.8"

networks:
  thvote-test:
    driver: bridge

volumes:
  postgres-test-data:
  redis-test-data:
  apollo-test-mysql-data:

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: thvote-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: thvote_test
      POSTGRES_USER: thvote_test
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-thvote_test_pass}
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    networks:
      - thvote-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thvote_test -d thvote_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: thvote-redis-test
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-test-data:/data
    networks:
      - thvote-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  apollo-mysql-test:
    image: mysql:8.0
    container_name: thvote-apollo-mysql-test
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${TEST_APOLLO_MYSQL_ROOT_PASSWORD:-apollo_root_pass}
      MYSQL_USER: ${TEST_APOLLO_MYSQL_USER:-apollo}
      MYSQL_PASSWORD: ${TEST_APOLLO_MYSQL_PASSWORD:-apollo_pass}
    volumes:
      - apollo-test-mysql-data:/var/lib/mysql
      - ./apollo/sql/official:/docker-entrypoint-initdb.d:ro
    networks:
      - thvote-test
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${TEST_APOLLO_MYSQL_ROOT_PASSWORD:-apollo_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  apollo-bootstrap-test:
    image: mysql:8.0
    container_name: thvote-apollo-bootstrap-test
    restart: "no"
    environment:
      APOLLO_MYSQL_HOST: apollo-mysql-test
      APOLLO_MYSQL_PORT: 3306
      APOLLO_MYSQL_ROOT_USER: root
      APOLLO_MYSQL_ROOT_PASSWORD: ${TEST_APOLLO_MYSQL_ROOT_PASSWORD:-apollo_root_pass}
      APOLLO_PORTAL_ENVS: fat
      APOLLO_PORTAL_META_SERVERS: '{"fat":"http://apollo-configservice-test:8080"}'
    volumes:
      - ./apollo/sql/official:/apollo/sql/official:ro
      - ./apollo/scripts/bootstrap.sh:/apollo/scripts/bootstrap.sh:ro
    networks:
      - thvote-test
    depends_on:
      apollo-mysql-test:
        condition: service_healthy
    command: ["sh", "/apollo/scripts/bootstrap.sh"]

  apollo-configservice-test:
    image: apolloconfig/apollo-configservice:${APOLLO_VERSION:-2.4.0}
    container_name: thvote-apollo-configservice-test
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-mysql-test:3306/ApolloConfigDB?characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${TEST_APOLLO_MYSQL_USER:-apollo}
      SPRING_DATASOURCE_PASSWORD: ${TEST_APOLLO_MYSQL_PASSWORD:-apollo_pass}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://apollo-configservice-test:8080/eureka/
    networks:
      - thvote-test
    depends_on:
      apollo-bootstrap-test:
        condition: service_completed_successfully

  apollo-adminservice-test:
    image: apolloconfig/apollo-adminservice:${APOLLO_VERSION:-2.4.0}
    container_name: thvote-apollo-adminservice-test
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-mysql-test:3306/ApolloConfigDB?characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${TEST_APOLLO_MYSQL_USER:-apollo}
      SPRING_DATASOURCE_PASSWORD: ${TEST_APOLLO_MYSQL_PASSWORD:-apollo_pass}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://apollo-configservice-test:8080/eureka/
    networks:
      - thvote-test
    depends_on:
      apollo-bootstrap-test:
        condition: service_completed_successfully
      apollo-configservice-test:
        condition: service_started

  apollo-portal-test:
    image: apolloconfig/apollo-portal:${APOLLO_VERSION:-2.4.0}
    container_name: thvote-apollo-portal-test
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-mysql-test:3306/ApolloPortalDB?characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${TEST_APOLLO_MYSQL_USER:-apollo}
      SPRING_DATASOURCE_PASSWORD: ${TEST_APOLLO_MYSQL_PASSWORD:-apollo_pass}
    ports:
      - "18080:8070"
    networks:
      - thvote-test
    depends_on:
      apollo-adminservice-test:
        condition: service_started

  backend-test:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    image: thvote-backend:test
    container_name: thvote-backend-test
    restart: unless-stopped
    env_file:
      - ../.env.test
    environment:
      DATABASE_URL: postgresql+asyncpg://thvote_test:${TEST_DB_PASSWORD:-thvote_test_pass}@postgres-test:5432/thvote_test
      REDIS_URL: redis://redis-test:6379/0
      APOLLO_ENABLED: "true"
      APOLLO_META: http://apollo-configservice-test:8080
      APOLLO_ENV: fat
      APOLLO_CLUSTER: default
      APOLLO_APP_ID: thvote-backend
      APOLLO_NAMESPACES: application
    volumes:
      - ../logs:/app/logs
    networks:
      - thvote-test
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend-test:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.test
    image: thvote-frontend:test
    container_name: thvote-frontend-test
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - ../frontend/nginx/test.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - thvote-test
    depends_on:
      - backend-test

