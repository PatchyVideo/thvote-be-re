version: "3.8"

networks:
  thvote-prod:
    name: thvote-net
    external: true

volumes:
  redis-prod-data:

services:
  redis-prod:
    image: redis:7-alpine
    container_name: thvote-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-prod-data:/data
    networks:
      - thvote-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend-prod:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    image: thvote-backend:prod
    container_name: thvote-backend-prod
    restart: always
    secrets:
      - jwt_secret_key
    environment:
      APOLLO_ENABLED: ${APOLLO_ENABLED:-yes}
      APOLLO_META: ${APOLLO_META:-http://apollo-configservice:8080}
      APOLLO_ENV: ${APOLLO_ENV:-pro}
      APOLLO_CLUSTER: default
      APOLLO_APP_ID: thvote-backend
      APOLLO_NAMESPACES: ${APOLLO_NAMESPACES:-application}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
    volumes:
      - ../logs:/app/logs
    networks:
      - thvote-prod
    depends_on:
      redis-prod:
        condition: service_healthy

  frontend-prod:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.prod
    image: thvote-frontend:prod
    container_name: thvote-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - thvote-prod
    depends_on:
      - backend-prod

secrets:
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
