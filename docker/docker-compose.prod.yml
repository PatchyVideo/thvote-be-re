version: "3.8"

networks:
  thvote-prod:
    driver: bridge

volumes:
  postgres-prod-data:
  redis-prod-data:
  apollo-prod-mysql-data:

services:
  postgres-prod:
    image: postgres:15-alpine
    container_name: thvote-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: thvote_prod
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_user
      - db_password
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - thvote-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d thvote_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-prod:
    image: redis:7-alpine
    container_name: thvote-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-prod-data:/data
    networks:
      - thvote-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  apollo-mysql-prod:
    image: mysql:8.0
    container_name: thvote-apollo-mysql-prod
    restart: always
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${APOLLO_MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${APOLLO_MYSQL_USER}
      MYSQL_PASSWORD: ${APOLLO_MYSQL_PASSWORD}
    volumes:
      - apollo-prod-mysql-data:/var/lib/mysql
      - ./apollo/sql/official:/docker-entrypoint-initdb.d:ro
    networks:
      - thvote-prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${APOLLO_MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  apollo-bootstrap-prod:
    image: mysql:8.0
    container_name: thvote-apollo-bootstrap-prod
    restart: "no"
    environment:
      APOLLO_MYSQL_HOST: apollo-mysql-prod
      APOLLO_MYSQL_PORT: 3306
      APOLLO_MYSQL_ROOT_USER: root
      APOLLO_MYSQL_ROOT_PASSWORD: ${APOLLO_MYSQL_ROOT_PASSWORD}
      APOLLO_PORTAL_ENVS: ${APOLLO_PORTAL_ENVS:-pro}
      APOLLO_PORTAL_META_SERVERS: ${APOLLO_PORTAL_META_SERVERS:-{"pro":"http://apollo-configservice-prod:8080"}}
    volumes:
      - ./apollo/sql/official:/apollo/sql/official:ro
      - ./apollo/scripts/bootstrap.sh:/apollo/scripts/bootstrap.sh:ro
    networks:
      - thvote-prod
    depends_on:
      apollo-mysql-prod:
        condition: service_healthy
    command: ["sh", "/apollo/scripts/bootstrap.sh"]

  apollo-configservice-prod:
    image: apolloconfig/apollo-configservice:${APOLLO_VERSION:-2.4.0}
    container_name: thvote-apollo-configservice-prod
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-mysql-prod:3306/ApolloConfigDB?characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${APOLLO_MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${APOLLO_MYSQL_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://apollo-configservice-prod:8080/eureka/
    networks:
      - thvote-prod
    depends_on:
      apollo-bootstrap-prod:
        condition: service_completed_successfully

  apollo-adminservice-prod:
    image: apolloconfig/apollo-adminservice:${APOLLO_VERSION:-2.4.0}
    container_name: thvote-apollo-adminservice-prod
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-mysql-prod:3306/ApolloConfigDB?characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${APOLLO_MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${APOLLO_MYSQL_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://apollo-configservice-prod:8080/eureka/
    networks:
      - thvote-prod
    depends_on:
      apollo-bootstrap-prod:
        condition: service_completed_successfully
      apollo-configservice-prod:
        condition: service_started

  apollo-portal-prod:
    image: apolloconfig/apollo-portal:${APOLLO_VERSION:-2.4.0}
    container_name: thvote-apollo-portal-prod
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://apollo-mysql-prod:3306/ApolloPortalDB?characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${APOLLO_MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${APOLLO_MYSQL_PASSWORD}
    ports:
      - "${APOLLO_PORTAL_PORT:-8070}:8070"
    networks:
      - thvote-prod
    depends_on:
      apollo-adminservice-prod:
        condition: service_started

  backend-prod:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    image: thvote-backend:prod
    container_name: thvote-backend-prod
    restart: always
    secrets:
      - jwt_secret_key
    environment:
      APOLLO_ENABLED: "true"
      APOLLO_META: ${APOLLO_META:-http://apollo-configservice-prod:8080}
      APOLLO_ENV: pro
      APOLLO_CLUSTER: default
      APOLLO_APP_ID: thvote-backend
      APOLLO_NAMESPACES: ${APOLLO_NAMESPACES:-application}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
    volumes:
      - ../logs:/app/logs
    networks:
      - thvote-prod
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy

  frontend-prod:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.prod
    image: thvote-frontend:prod
    container_name: thvote-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - thvote-prod
    depends_on:
      - backend-prod

secrets:
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
