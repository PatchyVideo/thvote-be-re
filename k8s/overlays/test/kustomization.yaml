apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test

resources:
  - ../../base/deployment.yaml
  - ../../base/service.yaml
  - ../../base/configmap.yaml
  - ../../base/db-secret.yaml
  - ../../base/redis-secret.yaml
  - secret.yaml

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
