apiVersion: apps/v1
kind: Deployment
metadata:
  name: toho-vote-be
  labels:
    app: toho-vote-be
spec:
  replicas: 1
  selector:
    matchLabels:
      app: toho-vote-be
  template:
    metadata:
      labels:
        app: toho-vote-be
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: toho-vote-be
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            # 数据库配置（从 ConfigMap）
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_SCHEMA
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SCHEMA
            - name: DB_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_DRIVER
            - name: DB_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_POOL_SIZE
            - name: DB_MAX_OVERFLOW
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_MAX_OVERFLOW
            - name: DB_POOL_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_POOL_TIMEOUT
            - name: DB_POOL_RECYCLE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_POOL_RECYCLE
            - name: DATABASE_ECHO
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DATABASE_ECHO
            # Redis 配置（从 ConfigMap）
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_DB
            - name: REDIS_SSL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_SSL
            # Nacos 配置（从 ConfigMap）
            - name: NACOS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_ENABLED
            - name: NACOS_SERVER_ADDRS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_SERVER_ADDRS
            - name: NACOS_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_NAMESPACE
            - name: NACOS_DATA_ID
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_DATA_ID
            - name: NACOS_GROUP
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_GROUP
            - name: NACOS_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_TIMEOUT_SECONDS
            # 敏感配置（从 Secret）
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: jwt-secret-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
