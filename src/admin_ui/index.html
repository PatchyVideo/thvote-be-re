<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THVote Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f0f2f5; color: #1a1a1a; min-height: 100vh; }
  #login-overlay { position: fixed; inset: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 100; }
  #login-box { background: #fff; padding: 2rem; border-radius: 8px; width: 320px; border: 1px solid #e2e2e2; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
  #login-box h2 { margin-bottom: 1rem; color: #111; }
  #login-box input { width: 100%; padding: .6rem; background: #fff; border: 1px solid #ccc; color: #1a1a1a; border-radius: 4px; margin-bottom: .8rem; }
  #login-error { color: #dc2626; font-size: .85rem; margin-bottom: .5rem; min-height: 1.2em; }
  nav { background: #fff; padding: .8rem 1.5rem; display: flex; gap: .5rem; align-items: center; border-bottom: 1px solid #e2e2e2; }
  nav .brand { color: #555; margin-right: auto; font-weight: bold; }
  nav button { background: none; border: none; color: #555; cursor: pointer; padding: .4rem .8rem; border-radius: 4px; }
  nav button.active, nav button:hover { background: #eef2ff; color: #2563eb; }
  #content { padding: 1.5rem; }
  .card { background: #fff; border: 1px solid #e2e2e2; border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .stats-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .stat-card { background: #f7f9fc; border: 1px solid #e2e2e2; border-radius: 6px; padding: 1rem 1.5rem; min-width: 140px; }
  .stat-card .val { font-size: 1.8rem; font-weight: bold; color: #2563eb; }
  .stat-card .lbl { font-size: .8rem; color: #888; margin-top: .2rem; }
  input[type=text], input[type=number], input[type=password], select, textarea {
    background: #fff; border: 1px solid #ccc; color: #1a1a1a;
    padding: .5rem .7rem; border-radius: 4px; font-family: inherit; }
  button.btn { background: #2563eb; border: none; color: #fff; padding: .5rem 1rem; border-radius: 4px; cursor: pointer; }
  button.btn:hover { background: #1d4ed8; }
  button.btn.danger { background: #dc2626; }
  button.btn.danger:hover { background: #b91c1c; }
  button.btn.green { background: #16a34a; }
  button.btn.green:hover { background: #15803d; }
  button.btn.ghost { background: #fff; color: #374151; border: 1px solid #ccc; }
  button.btn.sm { padding: .3rem .6rem; font-size: .85rem; }
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th, td { text-align: left; padding: .5rem .7rem; border-bottom: 1px solid #eee; }
  th { color: #888; font-weight: 500; }
  .search-row { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-block; padding: .15rem .5rem; border-radius: 3px; font-size: .8rem; }
  .badge.open { background: #dcfce7; color: #16a34a; }
  .badge.closed { background: #fee2e2; color: #dc2626; }
  .badge.upcoming { background: #fef9c3; color: #a16207; }
  progress { width: 100%; height: 8px; }
  .progress-wrap { margin: .5rem 0; }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1a1a1a; color: #fff;
           padding: .8rem 1.2rem; border-radius: 6px; z-index: 200; opacity: 0;
           transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .loading { color: #888; padding: 1rem; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex;
                   align-items: flex-start; justify-content: center; padding-top: 6vh; z-index: 150; }
  .modal { width: 460px; max-width: 92vw; background: #fff; border-radius: 10px;
           box-shadow: 0 12px 40px rgba(0,0,0,.2); overflow: hidden; }
  .modal-head { padding: .8rem 1.1rem; border-bottom: 1px solid #eee; font-weight: 600; }
  .modal-body { padding: 1.1rem; max-height: 60vh; overflow-y: auto; }
  .modal-foot { display: flex; gap: .5rem; padding: .8rem 1.1rem; border-top: 1px solid #eee; background: #fafafa; }
  .field { margin-bottom: .7rem; }
  .field label { display: block; font-size: .8rem; color: #555; margin-bottom: .25rem; }
  .field label .req { color: #dc2626; }
  .field input, .field textarea { width: 100%; }
  .seg { display: inline-flex; border: 1px solid #ccc; border-radius: 5px; overflow: hidden; font-size: .8rem; }
  .seg span { padding: .35rem .7rem; cursor: pointer; }
  .seg span.on { background: #2563eb; color: #fff; }
  .preview { border: 1px solid #eee; border-radius: 6px; margin-top: .6rem; }
  .preview-head { padding: .4rem .6rem; background: #f7f7f7; font-size: .8rem; border-bottom: 1px solid #eee; }
  .ok { color: #16a34a; }
  .err { color: #dc2626; }
</style>
</head>
<body>

<div id="login-overlay">
  <div id="login-box">
    <h2>THVote Admin</h2>
    <input id="secret-input" type="password" placeholder="Admin Secret" />
    <div id="login-error"></div>
    <button class="btn" onclick="doLogin()">进入</button>
  </div>
</div>

<nav id="main-nav" style="display:none">
  <span class="brand">THVote Admin</span>
  <button onclick="showTab('dashboard')" id="tab-dashboard" class="active">Dashboard</button>
  <button onclick="showTab('users')" id="tab-users">用户管理</button>
  <button onclick="showTab('sync')" id="tab-sync">数据同步</button>
  <button onclick="showTab('candidates')" id="tab-candidates">候选项</button>
  <button onclick="showTab('nominations')" id="tab-nominations">提名审核</button>
  <button onclick="showTab('logs')" id="tab-logs">审计日志</button>
  <button onclick="showTab('export')" id="tab-export">导出</button>
  <button onclick="doLogout()" style="margin-left:auto;color:#f88">退出</button>
</nav>

<div id="content" style="display:none"></div>
<div id="toast" class="toast"></div>

<script>
let SECRET = '';
let syncPollTimer = null;
const BASE = '/api/v1';

// ── auth ──────────────────────────────────────────────────────────────────────

async function doLogin() {
  const val = document.getElementById('secret-input').value.trim();
  const err = document.getElementById('login-error');
  err.textContent = '';
  try {
    const r = await fetch(BASE + '/admin/stats', { headers: { 'X-Admin-Secret': val } });
    if (r.status === 403) { err.textContent = '密码错误'; return; }
    SECRET = val;
    sessionStorage.setItem('adminSecret', val);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('content').style.display = 'block';
    showTab('dashboard');
  } catch (e) { err.textContent = '连接失败: ' + e.message; }
}

function doLogout() {
  sessionStorage.removeItem('adminSecret');
  SECRET = '';
  location.reload();
}

async function api(path, opts = {}) {
  const r = await fetch(BASE + path, {
    ...opts,
    headers: { 'X-Admin-Secret': SECRET, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (r.status === 403) { doLogout(); throw new Error('Unauthorized'); }
  return r;
}

function toast(msg, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), ms);
}

function openModal(html) {
  closeModal();
  const ov = document.createElement('div');
  ov.className = 'modal-overlay';
  ov.id = 'modal-overlay';
  ov.innerHTML = '<div class="modal">' + html + '</div>';
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() {
  const ov = document.getElementById('modal-overlay');
  if (ov) ov.remove();
}

// ── tabs ──────────────────────────────────────────────────────────────────────

const TABS = { dashboard, users, sync, candidates, nominations, logs, export: exportTab };

function showTab(name) {
  document.querySelectorAll('nav button[id^=tab-]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tab-' + name);
  if (btn) btn.classList.add('active');
  if (syncPollTimer) { clearInterval(syncPollTimer); syncPollTimer = null; }
  document.getElementById('content').innerHTML = '<div class="loading">加载中…</div>';
  (TABS[name] || (() => {}))();
}

// ── dashboard ─────────────────────────────────────────────────────────────────

async function dashboard() {
  const r = await api('/admin/stats');
  const d = await r.json();
  const w = d.vote_window;
  document.getElementById('content').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="val">${d.total_users}</div><div class="lbl">注册用户</div></div>
      <div class="stat-card"><div class="val">${d.submissions.character}</div><div class="lbl">角色投票</div></div>
      <div class="stat-card"><div class="val">${d.submissions.music}</div><div class="lbl">音乐投票</div></div>
      <div class="stat-card"><div class="val">${d.submissions.cp}</div><div class="lbl">CP 投票</div></div>
      <div class="stat-card"><div class="val"><span class="badge ${w.status}">${w.status}</span></div><div class="lbl">投票窗口</div></div>
    </div>
    <div class="card">
      <div style="display:flex;gap:.8rem;flex-wrap:wrap">
        <button class="btn" onclick="quickAction('compute-results','POST','触发排名计算？')">Compute Results</button>
        <button class="btn" onclick="quickAction('finalize-ranking','POST','归档最终排名？')">Finalize Ranking</button>
        <button class="btn" onclick="quickAction('reload-config','POST','热更新配置？')">Reload Config</button>
      </div>
    </div>`;
}

async function quickAction(endpoint, method, confirm_msg) {
  if (!confirm(confirm_msg)) return;
  try {
    const r = await api('/admin/' + endpoint, { method });
    const d = await r.json();
    toast(JSON.stringify(d).slice(0, 80));
  } catch (e) { toast('Error: ' + e.message); }
}

// ── users ─────────────────────────────────────────────────────────────────────

async function users() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="search-row">
        <input type="text" id="u-email" placeholder="邮箱" style="width:200px" />
        <input type="text" id="u-phone" placeholder="手机号" style="width:160px" />
        <button class="btn" onclick="searchUsers(1)">搜索</button>
      </div>
      <div id="users-table"></div>
    </div>`;
}

async function searchUsers(page) {
  const email = document.getElementById('u-email').value;
  const phone = document.getElementById('u-phone').value;
  let url = '/admin/users?page=' + page + '&page_size=20';
  if (email) url += '&email=' + encodeURIComponent(email);
  if (phone) url += '&phone=' + encodeURIComponent(phone);
  const r = await api(url);
  const d = await r.json();
  const rows = d.items.map(u => `<tr>
    <td style="font-family:monospace;font-size:.8rem">${u.id.slice(0,12)}…</td>
    <td>${u.nickname || '-'}</td><td>${u.email || '-'}</td><td>${u.phone || '-'}</td>
    <td>${u.email_verified ? '✓' : '-'}</td>
    <td><span class="badge ${u.removed ? 'closed' : 'open'}">${u.removed ? '封禁' : '正常'}</span></td>
    <td>${u.removed
      ? '<button class="btn sm" onclick="toggleBan(\'' + u.id + '\',false)">解封</button>'
      : '<button class="btn sm danger" onclick="toggleBan(\'' + u.id + '\',true)">封禁</button>'}</td>
  </tr>`).join('');
  document.getElementById('users-table').innerHTML = `
    <table><thead><tr><th>ID</th><th>昵称</th><th>邮箱</th><th>手机</th><th>邮箱验证</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>${rows || '<tr><td colspan="7" style="color:#666;text-align:center">无结果</td></tr>'}</tbody></table>
    <div style="margin-top:.8rem;color:#888">共 ${d.total} 条</div>`;
}

async function toggleBan(userId, ban) {
  if (!confirm(ban ? '确认封禁此用户？' : '确认解封此用户？')) return;
  await api('/admin/users/' + userId + '/' + (ban ? 'ban' : 'unban'), { method: 'PATCH' });
  toast(ban ? '已封禁' : '已解封');
  searchUsers(1);
}

// ── sync ──────────────────────────────────────────────────────────────────────

async function sync() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3 style="margin-bottom:1rem">启动同步</h3>
      <div class="search-row">
        <input type="number" id="sync-batch" value="500" style="width:100px" /> 批次大小
        <button class="btn" onclick="startSync()">Start Sync</button>
        <button class="btn danger" onclick="cancelSync()">Cancel</button>
      </div>
      <div id="sync-progress" style="margin-top:1rem"></div>
    </div>
    <div class="card"><h3 style="margin-bottom:.8rem">历史记录</h3><div id="sync-history"></div></div>`;
  await loadSyncHistory();
  syncPollTimer = setInterval(pollSyncStatus, 2000);
}

async function startSync() {
  const batch = parseInt(document.getElementById('sync-batch').value) || 500;
  const r = await api('/admin/sync/start', {
    method: 'POST', body: JSON.stringify({ batch_size: batch, collections: [] }) });
  const d = await r.json();
  toast('Started: ' + (d.run_id || '').slice(0, 8));
}

async function cancelSync() {
  await api('/admin/sync/cancel', { method: 'POST' });
  toast('Cancel signal sent');
}

async function pollSyncStatus() {
  const r = await api('/admin/sync/status');
  const d = await r.json();
  const el = document.getElementById('sync-progress');
  if (!el) return;
  if (d.status === 'idle' || !d.run_id) {
    el.innerHTML = '<span style="color:#888">无运行中的同步</span>'; return;
  }
  const pct = d.total > 0 ? Math.round(d.processed / d.total * 100) : 0;
  el.innerHTML = `
    <div>Run: ${(d.run_id||'').slice(0,8)} | ${d.status} | ${d.current_collection || '-'}</div>
    <div class="progress-wrap"><progress value="${d.processed}" max="${Math.max(d.total,1)}"></progress></div>
    <div style="color:#888;font-size:.85rem">${d.processed}/${d.total} 插入:${d.inserted} 跳过:${d.skipped} 错误:${d.errors}</div>`;
  if (d.status === 'completed' || d.status === 'failed') loadSyncHistory();
}

async function loadSyncHistory() {
  const r = await api('/admin/sync/history');
  const d = await r.json();
  const el = document.getElementById('sync-history');
  if (!el) return;
  const rows = (d.items || []).map(i => `<tr>
    <td style="font-family:monospace">${i.run_id.slice(0,8)}</td>
    <td>${i.started_at.slice(0,19)}</td>
    <td><span class="badge ${i.status==='completed'?'open':i.status==='running'?'upcoming':'closed'}">${i.status}</span></td>
    <td>${(i.collections||[]).length}</td><td>${i.inserted}</td><td>${i.errors}</td>
    <td><button class="btn sm" onclick="retrySyncRun('${i.run_id}')">Retry</button></td>
  </tr>`).join('');
  el.innerHTML = `<table><thead><tr><th>Run ID</th><th>开始时间</th><th>状态</th><th>集合</th><th>插入</th><th>错误</th><th>操作</th></tr></thead>
    <tbody>${rows || '<tr><td colspan="7" style="color:#666;text-align:center">暂无记录</td></tr>'}</tbody></table>`;
}

async function retrySyncRun(runId) {
  if (!confirm('从断点重试此运行？')) return;
  await api('/admin/sync/retry/' + runId, { method: 'POST' });
  toast('Retry started');
}

// ── candidates ────────────────────────────────────────────────────────────────

async function candidates() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="search-row">
        <select id="c-cat"><option value="character">角色</option><option value="music">音乐</option></select>
        <input type="number" id="c-year" value="${new Date().getFullYear()}" style="width:80px" />
        <input type="text" id="c-q" placeholder="名称搜索" style="width:180px" />
        <button class="btn" onclick="searchCandidates(1)">搜索</button>
        <button class="btn green" style="margin-left:auto" onclick="openImportModal()">+ 导入</button>
      </div>
      <div id="candidates-table"></div>
    </div>`;
}

async function searchCandidates(page) {
  const cat = document.getElementById('c-cat').value;
  const year = document.getElementById('c-year').value;
  const q = document.getElementById('c-q').value;
  let url = '/admin/candidates?category=' + cat + '&vote_year=' + year + '&page=' + page + '&page_size=50';
  if (q) url += '&q=' + encodeURIComponent(q);
  const r = await api(url);
  const d = await r.json();
  window._candCache = {};
  const rows = d.items.map(i => {
    window._candCache[i.id] = i;
    return `<tr>
      <td>${i.name}</td><td>${i.name_jp||''}</td><td>${i.type||''}</td>
      <td>${i.origin||i.album||''}</td><td>${i.first_appearance||''}</td>
      <td><span style="color:#2563eb;cursor:pointer" onclick="openEditModal(${i.id})">编辑</span>
      &nbsp;<span style="color:#dc2626;cursor:pointer" onclick="deleteCandidate(${i.id},'${cat}')">删除</span></td>
    </tr>`;
  }).join('');
  document.getElementById('candidates-table').innerHTML = `
    <table><thead><tr><th>名称</th><th>日文名</th><th>类型</th><th>来源/专辑</th><th>首登</th><th>操作</th></tr></thead>
    <tbody>${rows || '<tr><td colspan="6" style="color:#888;text-align:center">无结果</td></tr>'}</tbody></table>
    <div style="margin-top:.8rem;color:#888">共 ${d.total} 条</div>`;
}

async function deleteCandidate(id, category) {
  if (!confirm('确认删除此候选项？')) return;
  await api('/admin/candidates/' + id + '?category=' + category, { method: 'DELETE' });
  toast('已删除');
  searchCandidates(1);
}

// ── candidate import modal ──────────────────────────────────────────────────────

let _impFmt = 'auto';

function openImportModal() {
  const cat = document.getElementById('c-cat').value;
  const year = document.getElementById('c-year').value;
  _impFmt = 'auto';
  openModal(`
    <div class="modal-head">导入候选项</div>
    <div class="modal-body">
      <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.6rem">
        <select id="imp-cat"><option value="character"${cat==='character'?' selected':''}>角色</option><option value="music"${cat==='music'?' selected':''}>音乐</option></select>
        <input type="number" id="imp-year" value="${year}" style="width:80px" />
        <span class="seg" id="imp-fmt">
          <span class="on" data-f="auto" onclick="setFmt(this)">自动</span>
          <span data-f="csv" onclick="setFmt(this)">CSV</span>
          <span data-f="json" onclick="setFmt(this)">JSON</span>
        </span>
      </div>
      <div class="field"><textarea id="imp-text" rows="4" placeholder="粘贴 CSV / JSON 文本…"></textarea></div>
      <div style="display:flex;gap:.5rem">
        <input type="file" id="imp-file" accept=".csv,.json,.txt" style="display:none" onchange="loadImportFile(this)" />
        <button class="btn ghost" onclick="document.getElementById('imp-file').click()">选择文件</button>
        <button class="btn" onclick="previewImport()">解析预览</button>
      </div>
      <div id="imp-preview"></div>
    </div>
    <div class="modal-foot">
      <button class="btn" id="imp-confirm" style="display:none" onclick="commitImport()">确认导入</button>
      <button class="btn ghost" onclick="closeModal()">取消</button>
    </div>`);
}

function setFmt(el) {
  _impFmt = el.dataset.f;
  el.parentElement.querySelectorAll('span').forEach(s => s.classList.remove('on'));
  el.classList.add('on');
}

function loadImportFile(input) {
  const f = input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => { document.getElementById('imp-text').value = reader.result; };
  reader.readAsText(f);
}

async function _importCall(dryRun) {
  return api('/admin/candidates/import', {
    method: 'POST',
    body: JSON.stringify({
      vote_year: parseInt(document.getElementById('imp-year').value),
      category: document.getElementById('imp-cat').value,
      format: _impFmt,
      content: document.getElementById('imp-text').value,
      dry_run: dryRun,
    }),
  });
}

async function previewImport() {
  const r = await _importCall(true);
  if (r.status === 400) {
    const e = await r.json();
    document.getElementById('imp-preview').innerHTML =
      `<div class="preview"><div class="preview-head err">解析失败: ${e.detail}</div></div>`;
    document.getElementById('imp-confirm').style.display = 'none';
    return;
  }
  const d = await r.json();
  const sample = d.valid.slice(0, 5).map(i =>
    `<tr><td>${i.name||''}</td><td>${i.name_jp||''}</td><td>${i.type||''}</td><td>${i.origin||i.album||''}</td></tr>`
  ).join('');
  const errLines = d.rejected.map(e => `第${e.line}行: ${e.reason}`).join('；');
  document.getElementById('imp-preview').innerHTML = `
    <div class="preview">
      <div class="preview-head">
        <span class="ok">✓ 有效 ${d.valid_count}</span>
        ${d.rejected.length ? ` &nbsp; <span class="err">✗ 错误 ${d.rejected.length}（${errLines}）</span>` : ''}
      </div>
      <table>${sample}</table>
    </div>`;
  const btn = document.getElementById('imp-confirm');
  btn.textContent = '确认导入 ' + d.valid_count + ' 条';
  btn.style.display = d.valid_count > 0 ? '' : 'none';
}

async function commitImport() {
  const r = await _importCall(false);
  if (r.status === 400) { const e = await r.json(); toast('解析失败: ' + e.detail); return; }
  const d = await r.json();
  toast('成功导入 ' + d.imported + ' 条');
  closeModal();
  searchCandidates(1);
}

// ── candidate edit modal (= detail page) ────────────────────────────────────────

async function openEditModal(id) {
  const cat = document.getElementById('c-cat').value;
  const row = (window._candCache || {})[id] || {};
  const fr = await api('/admin/candidates/fields?category=' + cat);
  const spec = (await fr.json()).fields;
  const fieldsHtml = spec.map(f => `
    <div class="field">
      <label>${f.name}${f.required ? ' <span class="req">*</span>' : ''}</label>
      <input id="ed-${f.name}" value="${row[f.name] != null ? String(row[f.name]).replace(/"/g,'&quot;') : ''}" />
    </div>`).join('');
  openModal(`
    <div class="modal-head">编辑：${row.name || ''}</div>
    <div class="modal-body">${fieldsHtml}</div>
    <div class="modal-foot">
      <button class="btn" onclick="saveEdit(${id},'${cat}')">保存</button>
      <button class="btn danger" onclick="deleteFromEdit(${id},'${cat}')">删除</button>
      <button class="btn ghost" onclick="closeModal()">取消</button>
    </div>`);
  window._editSpec = spec.map(f => f.name);
}

async function saveEdit(id, cat) {
  const fields = {};
  (window._editSpec || []).forEach(n => {
    fields[n] = document.getElementById('ed-' + n).value;
  });
  const r = await api('/admin/candidates/' + id, {
    method: 'PUT',
    body: JSON.stringify({ category: cat, fields }),
  });
  if (r.status === 409) { toast('该名称在本年份已存在'); return; }
  if (r.status === 404) { toast('候选项不存在'); return; }
  toast('已保存');
  closeModal();
  searchCandidates(1);
}

async function deleteFromEdit(id, cat) {
  if (!confirm('确认删除此候选项？')) return;
  await api('/admin/candidates/' + id + '?category=' + cat, { method: 'DELETE' });
  toast('已删除');
  closeModal();
  searchCandidates(1);
}

// ── nominations (二创提名审核) ──────────────────────────────────────────────────

async function nominations() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="search-row">
        <select id="nom-status">
          <option value="pending">待审核</option>
          <option value="approved">已通过</option>
          <option value="rejected">已驳回</option>
          <option value="all">全部</option>
        </select>
        <button class="btn" onclick="searchNominations(1)">查询</button>
      </div>
      <div id="nominations-table"></div>
    </div>`;
  searchNominations(1);
}

async function searchNominations(page) {
  const status = document.getElementById('nom-status').value;
  const r = await api('/admin/nominations?status=' + status + '&page=' + page + '&page_size=50');
  const d = await r.json();
  const rows = d.items.map(i => `<tr>
    <td>${i.title || '-'}</td>
    <td>${i.author || '-'}</td>
    <td><a href="${i.url}" target="_blank" style="color:#2563eb">链接</a></td>
    <td style="font-family:monospace;font-size:.8rem">${i.udid || '-'}</td>
    <td>${(i.publish_date || '').slice(0,10)}</td>
    <td><span class="badge ${i.status==='approved'?'open':i.status==='rejected'?'closed':'upcoming'}">${i.status}</span></td>
    <td>
      ${i.status === 'pending' ? `
        <button class="btn sm" onclick="reviewNomination(${i.id}, true)">通过</button>
        <button class="btn sm danger" onclick="reviewNomination(${i.id}, false)">驳回</button>
      ` : (i.reject_reason ? `<span style="color:#888">${i.reject_reason}</span>` : '-')}
    </td>
  </tr>`).join('');
  document.getElementById('nominations-table').innerHTML = `
    <table><thead><tr><th>标题</th><th>作者</th><th>链接</th><th>UDID</th><th>发布</th><th>状态</th><th>操作</th></tr></thead>
    <tbody>${rows || '<tr><td colspan="7" style="color:#888;text-align:center">无结果</td></tr>'}</tbody></table>
    <div style="margin-top:.8rem;color:#888">共 ${d.total} 条</div>`;
}

async function reviewNomination(id, approve) {
  if (approve) {
    await api('/admin/nominations/' + id + '/approve', { method: 'PATCH' });
    toast('已通过');
  } else {
    const reason = prompt('驳回原因：', '');
    if (reason === null) return;
    await api('/admin/nominations/' + id + '/reject', {
      method: 'PATCH', body: JSON.stringify({ reason }),
    });
    toast('已驳回');
  }
  searchNominations(1);
}

// ── logs ──────────────────────────────────────────────────────────────────────

async function logs() {
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="search-row">
        <input type="text" id="l-uid" placeholder="user_id" style="width:200px" />
        <input type="text" id="l-action" placeholder="event_type" style="width:160px" />
        <input type="text" id="l-since" placeholder="since (ISO)" style="width:180px" />
        <button class="btn" onclick="searchLogs(1)">搜索</button>
      </div>
      <div id="logs-table"></div>
    </div>`;
}

async function searchLogs(page) {
  let url = '/admin/activity-logs?page=' + page + '&page_size=50';
  const uid = document.getElementById('l-uid').value;
  const action = document.getElementById('l-action').value;
  const since = document.getElementById('l-since').value;
  if (uid) url += '&user_id=' + encodeURIComponent(uid);
  if (action) url += '&action=' + encodeURIComponent(action);
  if (since) url += '&since=' + encodeURIComponent(since);
  const r = await api(url);
  const d = await r.json();
  const rows = d.items.map(i => `<tr>
    <td>${i.created_at.slice(0,19)}</td><td>${i.event_type}</td>
    <td style="font-family:monospace;font-size:.8rem">${(i.user_id||'-').slice(0,16)}</td>
    <td>${i.requester_ip||'-'}</td>
  </tr>`).join('');
  document.getElementById('logs-table').innerHTML = `
    <table><thead><tr><th>时间</th><th>事件</th><th>用户ID</th><th>IP</th></tr></thead>
    <tbody>${rows || '<tr><td colspan="4" style="color:#666;text-align:center">无结果</td></tr>'}</tbody></table>
    <div style="margin-top:.8rem;color:#888">共 ${d.total} 条</div>`;
}

// ── export ────────────────────────────────────────────────────────────────────

function exportTab() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:400px">
      <h3 style="margin-bottom:1rem">导出投票数据 CSV</h3>
      <div style="display:flex;flex-direction:column;gap:.8rem">
        <label>年份：<input type="number" id="exp-year" value="${new Date().getFullYear()}" style="width:100px;margin-left:.5rem" /></label>
        <label>类别：
          <select id="exp-cat" style="margin-left:.5rem">
            <option value="character">角色</option><option value="music">音乐</option>
            <option value="cp">CP</option><option value="paper">问卷</option>
            <option value="dojin">同人</option>
          </select>
        </label>
        <button class="btn" onclick="downloadCSV()">Download CSV</button>
      </div>
    </div>`;
}

function downloadCSV() {
  const year = document.getElementById('exp-year').value;
  const cat = document.getElementById('exp-cat').value;
  const url = BASE + '/admin/export/votes?vote_year=' + year + '&category=' + cat;
  api('/admin/export/votes?vote_year=' + year + '&category=' + cat)
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'votes_' + year + '_' + cat + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
}

// ── init ──────────────────────────────────────────────────────────────────────

window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('adminSecret');
  if (saved) {
    SECRET = saved;
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('content').style.display = 'block';
    showTab('dashboard');
  }
  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
</body>
