# ============================================================
# THVote 生产环境 Nginx 配置
#
# 功能：
# 1. 提供前端静态文件服务（HTTPS）
# 2. 反向代理 /api 请求到后端服务
# 3. 反向代理 /graphql 请求到后端服务
# 4. HTTP 自动跳转 HTTPS
# 5. 安全头配置
# ============================================================

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS 主服务器
server {
    listen 443 ssl http2;
    server_name localhost;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS（生产环境建议开启）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 日志配置
    access_log /var/log/nginx/prod-access.log;
    error_log /var/log/nginx/prod-error.log warn;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:;" always;

    # API 代理
    location /api/ {
        proxy_pass http://backend-prod:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # 生产环境超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 速率限制（可选）
        # limit_req zone=api_limit burst=20 nodelay;
    }

    # GraphQL 代理
    location /graphql/ {
        proxy_pass http://backend-prod:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Apollo Portal 代理（可选）
    location /apollo/ {
        proxy_pass http://apollo-portal-prod:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源长期缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # HTML 不缓存
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # 禁止访问隐藏文件和敏感路径
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|log|sql|bak|config)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================================
# 生产环境使用说明：
#
# 1. SSL 证书：
#    - 将证书文件放入 ./frontend/nginx/ssl/ 目录
#    - server.crt: 服务器证书（含中间证书）
#    - server.key: 私钥文件
#    - 推荐使用 Let's Encrypt 免费证书
#
# 2. 性能优化建议：
#    - 启用 HTTP/2（已在配置中启用）
#    - 开启浏览器缓存（已配置）
#    - 考虑使用 CDN 加速静态资源
#
# 3. 安全建议：
#    - 定期更新 SSL 证书
#    - 监控 SSL 证书过期时间
#    - 考虑开启 HSTS Preload
# ============================================================
