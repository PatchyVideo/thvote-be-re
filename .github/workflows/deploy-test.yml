# ============================================================
# THVote 测试环境 CI/CD 工作流
#
# 触发条件：
# - 推送到 main 或 zfq_dev 分支
# - PR 合并到 main 或 zfq_dev
#
# 功能：
# - 代码检查
# - 运行测试
# - 构建后端 Docker 镜像
# - 构建前端 Docker 镜像
# - 部署到测试环境
# ============================================================

name: Deploy to Test Environment

on:
  push:
    branches:
      - main
      - zfq_dev
  pull_request:
    branches:
      - main
      - zfq_dev
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/thvote
  FRONTEND_REPO: https://github.com/PatchyVideo/Touhou-Vote.git
  FRONTEND_BRANCH: dev

jobs:
  # ==================== 代码检查 ====================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -r requirements.txt

      - name: 代码格式检查 (Black)
        run: black --check --diff --target-version py312 src/ || true

      - name: 代码风格检查 (Flake8)
        run: flake8 src/ --max-line-length=120 || true

      - name: 导入排序检查 (isort)
        run: isort --check-only --diff src/ || true

      - name: 类型检查 (mypy)
        run: |
          mypy src/apps/ --ignore-missing-imports || true
          mypy src/common/exceptions.py --ignore-missing-imports || true
          mypy src/common/middleware/ --ignore-missing-imports || true
          mypy src/common/database.py --ignore-missing-imports || true
          mypy src/common/container.py --ignore-missing-imports || true
          mypy src/common/security/ --ignore-missing-imports || true
          mypy src/common/config.py --ignore-missing-imports || true
          mypy src/db_model/ --ignore-missing-imports || true
          mypy src/models/ --ignore-missing-imports || true

  # ==================== 运行测试 ====================
  test:
    name: 运行测试
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: thvote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: 运行测试
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/thvote_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          VOTE_START_ISO: '2025-01-01T00:00:00+08:00'
          VOTE_END_ISO: '2025-12-31T23:59:59+08:00'
        run: |
          pytest --cov=src --cov-report=xml tests/

      - name: 上传测试覆盖率
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ==================== 构建后端镜像 ====================
  build-backend:
    name: 构建后端镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'

    outputs:
      backend-tag: ${{ steps.meta.outputs.tags }}
      backend-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=test,enable=true

      - name: 构建并推送后端镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ==================== 构建前端镜像 ====================
  build-frontend:
    name: 构建前端镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'

    outputs:
      frontend-tag: ${{ steps.meta.outputs.tags }}
      frontend-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=test,enable=true

      - name: 构建并推送前端镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: ./frontend/Dockerfile.test
          build-args: |
            FRONTEND_BRANCH=${{ env.FRONTEND_BRANCH }}

  # ==================== 部署到测试环境 ====================
  deploy-test:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/zfq_dev')

    environment: test

    steps:
      - name: 检出部署配置
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker
          sparse-checkout-cone-mode: false

      - name: 判断需要部署的服务
        id: changed-services
        run: |
          # 获取本次推送涉及的 git 差异
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }}..${{ github.sha }})

          echo "=== 本次变更的文件 ==="
          echo "$CHANGED_FILES"
          echo ""

          # 判断后端是否需要重新部署
          if echo "$CHANGED_FILES" | grep -qE '^(src/|requirements\.txt|Dockerfile|config/|scripts/)'; then
            echo "deploy-backend=true" >> $GITHUB_OUTPUT
            echo "需要重新部署: 后端"
          else
            echo "deploy-backend=false" >> $GITHUB_OUTPUT
          fi

          # 判断前端是否需要重新部署
          if echo "$CHANGED_FILES" | grep -qE '^(frontend/|scripts/)'; then
            echo "deploy-frontend=true" >> $GITHUB_OUTPUT
            echo "需要重新部署: 前端"
          else
            echo "deploy-frontend=false" >> $GITHUB_OUTPUT
          fi

          # 至少部署一个服务
          echo "deploy-any=true" >> $GITHUB_OUTPUT

      - name: 部署到测试服务器
        if: steps.changed-services.outputs.deploy-backend == 'true' || steps.changed-services.outputs.deploy-frontend == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          envs:
            DEPLOY_BACKEND,DEPLOY_FRONTEND
          script: |
            set -e
            cd /opt/thvote/test

            # 登录镜像仓库
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 创建环境变量文件
            cat > .env << 'ENVEOF'
            TEST_DB_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
            TEST_APOLLO_DB_PASSWORD=${{ secrets.TEST_APOLLO_DB_PASSWORD }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
            ENVEOF

            # ==================== 首次部署：创建基础设施 ====================
            if [ ! -f docker-compose.yml ]; then
              echo "=== 首次部署，创建基础设施 ==="

              cat > docker-compose.yml << 'COMPOSEEOF'
            version: "3.8"

            networks:
              thvote-test:
                driver: bridge

            volumes:
              postgres-test-data:
              redis-test-data:
              apollo-test-data:

            services:
              postgres-test:
                image: postgres:15-alpine
                container_name: thvote-postgres-test
                restart: unless-stopped
                environment:
                  POSTGRES_DB: thvote_test
                  POSTGRES_USER: thvote_test
                  POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-thvote_test_pass}
                volumes:
                  - postgres-test-data:/var/lib/postgresql/data
                networks:
                  - thvote-test
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U thvote_test -d thvote_test"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              redis-test:
                image: redis:7-alpine
                container_name: thvote-redis-test
                restart: unless-stopped
                command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
                volumes:
                  - redis-test-data:/data
                networks:
                  - thvote-test
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 3s
                  retries: 5

              apollo-test-db:
                image: postgres:15-alpine
                container_name: thvote-apollo-test-db
                restart: unless-stopped
                environment:
                  POSTGRES_DB: apollo_test
                  POSTGRES_USER: apollo_test
                  POSTGRES_PASSWORD: ${TEST_APOLLO_DB_PASSWORD:-apollo_test_pass}
                volumes:
                  - apollo-test-data:/var/lib/postgresql/data
                networks:
                  - thvote-test

              apollo-config-test:
                image: apolloconfig/apollo-config:2.0.0
                container_name: thvote-apollo-config-test
                restart: unless-stopped
                environment:
                  SPRING_DATASOURCE_URL: jdbc:postgresql://apollo-test-db:5432/apollo_test
                  SPRING_DATASOURCE_USERNAME: apollo_test
                  SPRING_DATASOURCE_PASSWORD: ${TEST_APOLLO_DB_PASSWORD:-apollo_test_pass}
                  APOLLO_CONFIG_PORT: 8080
                  APOLLO_CONFIG_NAMESRV_PORT: 8081
                networks:
                  - thvote-test

              apollo-portal-test:
                image: apolloconfig/apollo-portal:2.0.0
                container_name: thvote-apollo-portal-test
                restart: unless-stopped
                environment:
                  SPRING_DATASOURCE_URL: jdbc:postgresql://apollo-test-db:5432/apollo_test
                  SPRING_DATASOURCE_USERNAME: apollo_test
                  SPRING_DATASOURCE_PASSWORD: ${TEST_APOLLO_DB_PASSWORD:-apollo_test_pass}
                ports:
                  - "18080:8070"
                networks:
                  - thvote-test
                depends_on:
                  - apollo-config-test

              backend-test:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:test
                container_name: thvote-backend-test
                restart: unless-stopped
                environment:
                  DATABASE_URL: postgresql+asyncpg://thvote_test:${TEST_DB_PASSWORD:-thvote_test_pass}@postgres-test:5432/thvote_test
                  REDIS_URL: redis://redis-test:6379/0
                networks:
                  - thvote-test
                depends_on:
                  postgres-test:
                    condition: service_healthy
                  redis-test:
                    condition: service_healthy

              frontend-test:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:test
                container_name: thvote-frontend-test
                restart: unless-stopped
                ports:
                  - "8082:80"
                networks:
                  - thvote-test
                depends_on:
                  - backend-test
            COMPOSEEOF

              # 启动基础服务和所有应用服务
              docker-compose up -d
              echo "=== 首次部署完成 ==="
            else
              # ==================== 增量部署：只更新变动的服务 ====================
              echo "=== 增量部署模式 ==="

              # 确保基础服务运行
              docker-compose up -d postgres-test redis-test apollo-test-db apollo-config-test apollo-portal-test

              # 根据变更部署后端
              if [ "$DEPLOY_BACKEND" = "true" ]; then
                echo ">>> 重新部署后端服务..."
                docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:test
                docker-compose up -d --no-deps backend-test
              fi

              # 根据变更部署前端
              if [ "$DEPLOY_FRONTEND" = "true" ]; then
                echo ">>> 重新部署前端服务..."
                docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:test
                docker-compose up -d --no-deps frontend-test
              fi
            fi

            # 清理旧镜像
            docker image prune -f

            # 等待服务启动
            sleep 10

            # 检查服务状态
            echo "=== 容器状态 ==="
            docker-compose ps

            echo "=== 测试环境部署完成 ==="
            echo "访问地址: http://${{ secrets.TEST_SERVER_HOST }}:8082"

      - name: 无需部署
        if: steps.changed-services.outputs.deploy-backend != 'true' && steps.changed-services.outputs.deploy-frontend != 'true'
        run: |
          echo "本次推送没有代码变更，无需部署"
          echo "变更的文件不涉及 src/、frontend/、requirements.txt 等需要部署的文件"

  # ==================== 通知 ====================
  notify:
    name: 部署通知
    runs-on: ubuntu-latest
    needs: [deploy-test]
    if: always()

    steps:
      - name: 发送成功通知
        if: needs.deploy-test.result == 'success'
        run: |
          echo "测试环境部署成功！"
          echo "后端镜像: ${{ needs.build-backend.outputs.backend-tag }}"
          echo "前端镜像: ${{ needs.build-frontend.outputs.frontend-tag }}"
          echo "访问地址: http://${{ secrets.TEST_SERVER_HOST }}:8082"

      - name: 发送失败通知
        if: needs.deploy-test.result == 'failure'
        run: |
          echo "测试环境部署失败，请检查日志"
          exit 1
