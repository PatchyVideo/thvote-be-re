# ============================================================
# THVote 测试环境 CI/CD 工作流
#
# 触发条件：
# - 推送到 main / zfq_dev 分支
# - PR 合并到上述分支
# - 手动触发 (workflow_dispatch)
#
# 本工作流仅负责后端，不会触发前端构建。
# 前端由 Touhou-Vote 仓库独立构建部署。
# ============================================================

name: Test & Deploy Backend

on:
  push:
    branches:
      - main
      - zfq_dev
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - 'scripts/**'
      - 'docker/**'
      - '.github/workflows/deploy-test.yml'
  pull_request:
    branches:
      - main
      - zfq_dev
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: patchyvideo/thvote

jobs:
  # ==================== 代码检查 ====================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version-file: 'pyproject.toml'

      - name: 安装工具
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -e .

      - name: 代码风格检查
        run: flake8 src/ --max-line-length=88

  # ==================== 运行测试 ====================
  test:
    name: 运行测试
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: thvote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version-file: 'pyproject.toml'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
          pip install pytest pytest-asyncio httpx

      - name: 检查测试目录
        id: check_tests
        run: |
          if [ -d "tests/" ] && [ -n "$(ls -A tests/ 2>/dev/null)" ]; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: 应用 Alembic 迁移（针对真实 Postgres，作为迁移脚本的烟雾测试）
        if: steps.check_tests.outputs.exist == 'true'
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/thvote_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          VOTE_START_ISO: '2026-01-01T00:00:00+08:00'
          VOTE_END_ISO: '2026-12-31T23:59:59+08:00'
        run: |
          alembic upgrade head
          alembic current

      - name: 运行测试
        if: steps.check_tests.outputs.exist == 'true'
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/thvote_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          VOTE_START_ISO: '2026-01-01T00:00:00+08:00'
          VOTE_END_ISO: '2026-12-31T23:59:59+08:00'
        run: pytest --cov=src --cov-report=xml tests/

      - name: 上传覆盖率
        if: steps.check_tests.outputs.exist == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: 无测试文件
        if: steps.check_tests.outputs.exist == 'false'
        run: echo "tests/ 目录不存在或为空，跳过测试执行"

  # ==================== 构建后端镜像 ====================
  build-backend:
    name: 构建后端镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'

    outputs:
      backend-tag: ${{ steps.meta.outputs.tags }}
      backend-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=test,enable=${{ github.ref_name != 'main' }}
            type=raw,value=prod,enable=${{ github.ref_name == 'main' }}

      - name: 构建并推送后端镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ==================== 部署到测试服务器 ====================
  deploy-test:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/zfq_dev')
    environment: test

    env:
      BACKEND_TAG: ${{ github.ref_name == 'main' && 'prod' || 'test' }}

    steps:
      - name: 检出部署配置
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker
          sparse-checkout-cone-mode: false

      - name: 上传 compose 模板到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "${{ vars.TEST_SERVER_DIR || '/opt/thvote/test' }}"
          strip_components: 1

      - name: 部署到测试服务器
        uses: appleboy/ssh-action@v1
        env:
          NACOS_SERVER_ADDRS: ${{ secrets.NACOS_SERVER_ADDRS }}
          NACOS_NAMESPACE: ${{ secrets.TEST_NACOS_NAMESPACE }}
          NACOS_USERNAME: ${{ secrets.TEST_NACOS_USERNAME }}
          NACOS_PASSWORD: ${{ secrets.TEST_NACOS_PASSWORD }}
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ env.BACKEND_TAG }}
          REGISTRY: ${{ env.REGISTRY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          envs: NACOS_SERVER_ADDRS,NACOS_NAMESPACE,NACOS_USERNAME,NACOS_PASSWORD,BACKEND_IMAGE,REGISTRY,GITHUB_ACTOR,GITHUB_TOKEN
          script: |
            set -e
            DEPLOY_DIR="${{ vars.TEST_SERVER_DIR || '/opt/thvote/test' }}"
            mkdir -p "$DEPLOY_DIR/logs"
            cd "$DEPLOY_DIR"

            echo "$GITHUB_TOKEN" | docker login "$REGISTRY" -u "$GITHUB_ACTOR" --password-stdin

            # 创建外部网络（如果不存在）
            if ! docker network ls | grep -q "thvote-net"; then
              docker network create thvote-net
              echo "已创建网络 thvote-net"
            fi

            # 写入 .env
            {
              echo "NACOS_ENABLED=true"
              echo "NACOS_SERVER_ADDRS=${NACOS_SERVER_ADDRS}"
              echo "NACOS_NAMESPACE=${NACOS_NAMESPACE}"
              echo "NACOS_GROUP=DEFAULT_GROUP"
              echo "NACOS_DATA_ID=thvote_be"
              echo "NACOS_USERNAME=${NACOS_USERNAME}"
              echo "NACOS_PASSWORD=${NACOS_PASSWORD}"
              echo "BACKEND_IMAGE=${BACKEND_IMAGE}"
            } > .env

            # 更新 docker-compose.yml（从仓库上传的模板）
            cp docker-compose.prod.yml docker-compose.yml
            echo "docker-compose.yml 已从仓库模板更新"

            # 拉取镜像
            docker pull "${BACKEND_IMAGE}" || true

            # 仅当 redis 未运行时才启动
            if docker ps --format '{{.Names}}' | grep -q '^thvote-redis$'; then
              echo "redis 正在运行，跳过启动"
            else
              docker compose up -d redis
            fi

            # 等 Postgres 就绪
            for i in $(seq 1 30); do
              if docker exec thvote-postgres pg_isready -U thvote >/dev/null 2>&1; then
                echo "postgres 就绪"
                break
              fi
              echo "等待 postgres 就绪... ($i/30)"
              sleep 2
            done

            # 应用 Alembic 迁移（DATABASE_URL 由 Nacos 下发）
            echo "执行 alembic upgrade head ..."
            docker run --rm \
              --network thvote-net \
              -e NACOS_ENABLED=true \
              -e NACOS_SERVER_ADDRS="${NACOS_SERVER_ADDRS}" \
              -e NACOS_NAMESPACE="${NACOS_NAMESPACE}" \
              -e NACOS_GROUP=DEFAULT_GROUP \
              -e NACOS_DATA_ID=thvote_be \
              -e NACOS_USERNAME="${NACOS_USERNAME}" \
              -e NACOS_PASSWORD="${NACOS_PASSWORD}" \
              "${BACKEND_IMAGE}" \
              alembic upgrade head

            # 启动后端
            docker compose up -d backend

            # 等待健康检查
            for i in $(seq 1 40); do
              BACKEND_HEALTH="$(docker inspect -f '{{.State.Health.Status}}' thvote-backend 2>/dev/null || true)"
              if [ "$BACKEND_HEALTH" = "healthy" ]; then
                echo "后端就绪"
                break
              fi
              if [ "$BACKEND_HEALTH" = "unhealthy" ]; then
                echo "后端已进入 unhealthy 状态"
                docker compose logs backend | tail -50
                exit 1
              fi
              echo "等待后端启动... ($i/40), 当前状态: ${BACKEND_HEALTH:-starting}"
              sleep 3
            done

            # 最终验证
            BACKEND_HEALTH="$(docker inspect -f '{{.State.Health.Status}}' thvote-backend 2>/dev/null || true)"
            if [ "$BACKEND_HEALTH" != "healthy" ]; then
              echo "后端健康检查失败，当前状态: ${BACKEND_HEALTH:-unknown}"
              docker compose logs backend | tail -50
              exit 1
            fi

            docker image prune -f
            echo "后端部署完成，地址: http://localhost:18000"

  # ==================== 通知 ====================
  notify:
    name: 通知
    runs-on: ubuntu-latest
    needs: [deploy-test]
    if: always()

    steps:
      - name: 成功
        if: needs.deploy-test.result == 'success' || needs.deploy-test.result == 'skipped'
        run: |
          echo "测试环境后端部署完成"
          echo "镜像: ${{ needs.build-backend.outputs.backend-tag }}"
          echo "后端: http://${{ secrets.TEST_SERVER_HOST }}:8000"

      - name: 失败
        if: needs.deploy-test.result == 'failure'
        run: |
          echo "测试环境后端部署失败"
          exit 1
