# ============================================================
# THVote 测试环境 CI/CD 工作流
#
# 触发条件：
# - 推送到 main / zfq_dev 分支
# - PR 合并到上述分支
# - 手动触发 (workflow_dispatch)
#
# 本工作流仅负责后端，不会触发前端构建。
# 前端由 Touhou-Vote 仓库独立构建部署。
# ============================================================

name: Test & Deploy Backend

on:
  push:
    branches:
      - main
      - zfq_dev
      - zfq_dev_pipeline
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'scripts/**'
      - '.github/workflows/deploy-test.yml'
  pull_request:
    branches:
      - main
      - zfq_dev
      - zfq_dev_pipeline
  workflow_dispatch:
    inputs:
      skip_tests:
        description: '跳过测试'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: patchyvideo/thvote

jobs:
  # ==================== 代码检查 ====================
  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装工具
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
          pip install -r requirements.txt

      - name: 代码风格检查
        run: flake8 src/ --max-line-length=120 || true

  # ==================== 运行测试 ====================
  test:
    name: 运行测试
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: thvote_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查测试目录
        id: check_tests
        run: |
          if [ -d "tests/" ] && [ -n "$(ls -A tests/ 2>/dev/null)" ]; then
            echo "exist=true" >> $GITHUB_OUTPUT
          else
            echo "exist=false" >> $GITHUB_OUTPUT
          fi

      - name: 设置 Python
        if: steps.check_tests.outputs.exist == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        if: steps.check_tests.outputs.exist == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: 运行测试
        if: steps.check_tests.outputs.exist == 'true'
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/thvote_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key
          VOTE_START_ISO: '2026-01-01T00:00:00+08:00'
          VOTE_END_ISO: '2026-12-31T23:59:59+08:00'
        run: pytest --cov=src --cov-report=xml tests/

      - name: 上传覆盖率
        if: steps.check_tests.outputs.exist == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ==================== 构建后端镜像 ====================
  build-backend:
    name: 构建后端镜像
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'

    outputs:
      backend-tag: ${{ steps.meta.outputs.tags }}
      backend-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=test,enable=true

      - name: 构建并推送后端镜像
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production

  # ==================== 部署到测试服务器 ====================
  deploy-test:
    name: 部署到测试环境
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/zfq_dev' || github.ref == 'refs/heads/zfq_dev_pipeline')
    environment: test

    steps:
      - name: 检出部署配置
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker
          sparse-checkout-cone-mode: false

      - name: 部署到测试服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          envs: DEPLOY_DIR
          script: |
            set -e
            DEPLOY_DIR="${{ vars.TEST_SERVER_DIR || '/opt/thvote/test' }}"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # 写入 .env
            cat > .env << 'ENVEOF'
            POSTGRES_DB=thvote_test
            POSTGRES_USER=thvote_test
            POSTGRES_PASSWORD=${{ secrets.TEST_DB_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.TEST_JWT_SECRET || 'dev-secret' }}
            APOLLO_ENABLED=yes
            APOLLO_META=${{ vars.APOLLO_META || 'http://apollo-configservice:8080' }}
            APOLLO_ENV=fat
            APOLLO_CLUSTER=default
            APOLLO_APP_ID=thvote-backend
            APOLLO_NAMESPACES=application
            BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:test
            ENVEOF

            # 旧版 compose 内嵌 Apollo，需要整体重写为外部 Apollo 结构
            RECREATE_COMPOSE="false"
            if ! grep -q "thvote-backend" docker-compose.yml 2>/dev/null; then
              RECREATE_COMPOSE="true"
            elif grep -q "apollo-mysql\\|apollo-configservice\\|apollo-bootstrap" docker-compose.yml 2>/dev/null; then
              RECREATE_COMPOSE="true"
            fi

            # 首次部署或检测到内嵌 Apollo 结构时重写 docker-compose.yml
            if [ "$RECREATE_COMPOSE" = "true" ]; then
              cat > docker-compose.yml << 'COMPOSEEOF'
            version: "3.8"

            x-common-backend: &common_backend
              restart: unless-stopped
              networks:
                - thvote-net
              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                interval: 15s
                timeout: 5s
                retries: 5
                start_period: 20s

            services:
              postgres:
                image: postgres:15-alpine
                container_name: thvote-postgres
                <<: *common_backend
                environment:
                  POSTGRES_DB: ${POSTGRES_DB:-thvote}
                  POSTGRES_USER: ${POSTGRES_USER:-thvote}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thvote_pass}
                volumes:
                  - postgres-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thvote} -d ${POSTGRES_DB:-thvote}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

              redis:
                image: redis:7-alpine
                container_name: thvote-redis
                <<: *common_backend
                command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
                volumes:
                  - redis-data:/data
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 3s
                  retries: 5

              backend:
                image: ${BACKEND_IMAGE}
                container_name: thvote-backend
                <<: *common_backend
                env_file:
                  - .env
                environment:
                  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-thvote}:${POSTGRES_PASSWORD:-thvote_pass}@postgres:5432/${POSTGRES_DB:-thvote}
                  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
                  APOLLO_ENABLED: ${APOLLO_ENABLED:-yes}
                  APOLLO_META: ${APOLLO_META:-http://apollo-configservice:8080}
                  APOLLO_ENV: ${APOLLO_ENV:-fat}
                  APOLLO_CLUSTER: ${APOLLO_CLUSTER:-default}
                  APOLLO_APP_ID: ${APOLLO_APP_ID:-thvote-backend}
                  APOLLO_NAMESPACES: ${APOLLO_NAMESPACES:-application}
                  APP_HOST: "0.0.0.0"
                  APP_PORT: "8000"
                volumes:
                  - ./logs:/app/logs
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                profiles:
                  - backend

            networks:
              thvote-net:
                name: thvote-net
                external: true

            volumes:
              postgres-data:
              redis-data:
            COMPOSEEOF
              echo "docker-compose.yml 已按外部 Apollo 拓扑重建"
            else
              sed -i "s|image: .*/thvote-backend:.*|image: ${BACKEND_IMAGE}|" docker-compose.yml
              echo "docker-compose.yml 已更新（仅替换 backend 镜像 tag）"
            fi

            # 拉取镜像
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:test || true

            # 基础服务只做保活，不随业务发布重启；Apollo 独立部署在 /opt/apollo
            docker-compose up -d postgres redis

            # 启动后端（直接指定 backend 服务，避免老版本 docker-compose 不支持 --profile）
            docker-compose up -d backend

            # 等待健康检查
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "后端就绪"
                break
              fi
              echo "等待后端启动... ($i/30)"
              sleep 2
            done

            # 验证
            if ! curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "后端健康检查失败"
              docker-compose logs backend | tail -20
              exit 1
            fi

            docker image prune -f
            echo "后端部署完成，地址: http://localhost:8000"

  # ==================== 通知 ====================
  notify:
    name: 通知
    runs-on: ubuntu-latest
    needs: [deploy-test]
    if: always()

    steps:
      - name: 成功
        if: needs.deploy-test.result == 'success' || needs.deploy-test.result == 'skipped'
        run: |
          echo "测试环境后端部署完成"
          echo "镜像: ${{ needs.build-backend.outputs.backend-tag }}"
          echo "后端: http://${{ secrets.TEST_SERVER_HOST }}:8000"

      - name: 失败
        if: needs.deploy-test.result == 'failure'
        run: |
          echo "测试环境后端部署失败"
          exit 1
